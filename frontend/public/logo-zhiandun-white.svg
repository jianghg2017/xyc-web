<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradW" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4B87A"/>
      <stop offset="100%" stop-color="#C49F5F"/>
    </linearGradient>
    <linearGradient id="lockGradW" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D4B87A"/>
    </linearGradient>
    <linearGradient id="shieldFillW" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C49F5F" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#A8854A" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Logo icon -->
  <g transform="translate(4, 2)">
    <!-- Shield outline - gold -->
    <path d="M20 2 L36 10 L36 24 C36 32 28 38 20 42 C12 38 4 32 4 24 L4 10 Z"
          fill="url(#shieldFillW)" stroke="url(#shieldGradW)" stroke-width="2" stroke-linejoin="round"/>

    <!-- Lock body - gold/white -->
    <rect x="14" y="20" width="12" height="10" rx="2" fill="url(#lockGradW)"/>

    <!-- Lock shackle - gold -->
    <path d="M16 20 L16 16 C16 12.5 18 10 20 10 C22 10 24 12.5 24 16 L24 20"
          fill="none" stroke="#D4B87A" stroke-width="2" stroke-linecap="round"/>

    <!-- Keyhole -->
    <circle cx="20" cy="24" r="1.8" fill="#0A2540"/>
    <rect x="19.2" y="25" width="1.6" height="3" rx="0.8" fill="#0A2540"/>

    <!-- Security signal arcs - gold -->
    <path d="M32 8 C34 10 35 13 35 16" fill="none" stroke="#C49F5F" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    <path d="M8 8 C6 10 5 13 5 16" fill="none" stroke="#C49F5F" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

    <!-- Top shield point accent -->
    <circle cx="20" cy="2" r="1.2" fill="#D4B87A"/>
  </g>

  <!-- Divider - gold tint -->
  <line x1="48" y1="10" x2="48" y2="38" stroke="#C49F5F" stroke-width="1" opacity="0.4"/>

  <!-- Chinese name - white -->
  <text x="56" y="28" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif"
        font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="2">智安盾</text>

  <!-- English subtitle - light gold -->
  <text x="56" y="42" font-family="'Segoe UI', Arial, sans-serif"
        font-size="9" font-weight="500" fill="#D4B87A" letter-spacing="1.8">ZHIANDUN</text>
</svg>
