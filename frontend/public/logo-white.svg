<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradW" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="accentGradW" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
  </defs>

  <!-- Logo 图标 -->
  <g transform="translate(4, 4)">
    <!-- 外部六边形轮廓 -->
    <path d="M20 2 L35 10 L35 26 L20 34 L5 26 L5 10 Z" 
          fill="none" stroke="url(#iconGradW)" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- 内部向上箭头 -->
    <path d="M20 8 L28 20 L23 20 L23 28 L17 28 L17 20 L12 20 Z" 
          fill="url(#accentGradW)"/>
    
    <!-- 底部小齿轮齿 -->
    <rect x="11" y="30" width="4" height="3" rx="0.5" fill="#93C5FD" opacity="0.6"/>
    <rect x="18" y="30" width="4" height="3" rx="0.5" fill="#93C5FD" opacity="0.6"/>
    <rect x="25" y="30" width="4" height="3" rx="0.5" fill="#93C5FD" opacity="0.6"/>
    
    <!-- 能源光点 -->
    <circle cx="20" cy="2" r="1.5" fill="#FFFFFF"/>
    <circle cx="35" cy="10" r="1.5" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="5" cy="10" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  </g>

  <!-- 分隔线 -->
  <line x1="48" y1="10" x2="48" y2="38" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>

  <!-- 中文名称 -->
  <text x="56" y="28" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" 
        font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="2">新益策</text>

  <!-- 英文副标题 -->
  <text x="56" y="42" font-family="'Segoe UI', Arial, sans-serif" 
        font-size="9" font-weight="500" fill="#CBD5E1" letter-spacing="2.5">XINYICE</text>
</svg>
