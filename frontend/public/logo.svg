<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- Logo 图标 -->
  <g transform="translate(4, 4)">
    <!-- 外部六边形轮廓 - 代表结构化咨询/制造 -->
    <path d="M20 2 L35 10 L35 26 L20 34 L5 26 L5 10 Z" 
          fill="none" stroke="url(#iconGrad)" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- 内部向上箭头 - 代表增长与策略 -->
    <path d="M20 8 L28 20 L23 20 L23 28 L17 28 L17 20 L12 20 Z" 
          fill="url(#accentGrad)"/>
    
    <!-- 底部小齿轮齿 - 代表智能制造 -->
    <rect x="11" y="30" width="4" height="3" rx="0.5" fill="#1D4ED8" opacity="0.6"/>
    <rect x="18" y="30" width="4" height="3" rx="0.5" fill="#1D4ED8" opacity="0.6"/>
    <rect x="25" y="30" width="4" height="3" rx="0.5" fill="#1D4ED8" opacity="0.6"/>
    
    <!-- 能源光点 -->
    <circle cx="20" cy="2" r="1.5" fill="#3B82F6"/>
    <circle cx="35" cy="10" r="1.5" fill="#3B82F6" opacity="0.7"/>
    <circle cx="5" cy="10" r="1.5" fill="#3B82F6" opacity="0.7"/>
  </g>

  <!-- 分隔线 -->
  <line x1="48" y1="10" x2="48" y2="38" stroke="#CBD5E1" stroke-width="1" opacity="0.5"/>

  <!-- 中文名称 -->
  <text x="56" y="28" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif" 
        font-size="22" font-weight="700" fill="#1E3A8A" letter-spacing="2">新益策</text>

  <!-- 英文副标题 -->
  <text x="56" y="42" font-family="'Segoe UI', Arial, sans-serif" 
        font-size="9" font-weight="500" fill="#64748B" letter-spacing="2.5">XINYICE</text>
</svg>
